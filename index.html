<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Optimized Particle Image</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: white;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();

// ===== Mouse =====
const mouse = {
    x: null,
    y: null,
    radius: 80
};

window.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

window.addEventListener("mouseout", () => {
    mouse.x = null;
    mouse.y = null;
});

// ===== Particle =====
class Particle {
    constructor(x, y) {
        this.baseX = x;
        this.baseY = y;
        this.x = x;
        this.y = y;
        this.size = 1;
    }

    update() {
        const dx = this.baseX - this.x;
        const dy = this.baseY - this.y;

        this.x += dx * 0.2;
        this.y += dy * 0.2;
    }
}

let particlesArray = [];

// ===== Load image =====
const image = new Image();
image.src = "quyenthoabit.jpg";

image.onload = async function () {
    particlesArray = [];

    const bitmap = await createImageBitmap(image);

    const tempCanvas = document.createElement("canvas");
    const tempCtx = tempCanvas.getContext("2d");

    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;

    const scale = Math.min(
        canvas.width / image.width,
        canvas.height / image.height
    ) * 0.8;

    const imgWidth = image.width * scale;
    const imgHeight = image.height * scale;

    const offsetX = (canvas.width - imgWidth) / 2;
    const offsetY = (canvas.height - imgHeight) / 2;

    tempCtx.drawImage(bitmap, offsetX, offsetY, imgWidth, imgHeight);

    const imageData = tempCtx.getImageData(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const gap = 1; // giữ chất lượng cao

    for (let y = 0; y < canvas.height; y += gap) {
        for (let x = 0; x < canvas.width; x += gap) {
            const index = (y * canvas.width + x) * 4;
            const alpha = imageData.data[index + 3];

            if (alpha > 128) {
                particlesArray.push(new Particle(x, y));
            }
        }
    }

    console.log("Particles:", particlesArray.length);
    animate();
};

image.onerror = function () {
    alert("Không tìm thấy image.png");
};

// ===== Animate =====
function animate() {

    // fade thay vì clear toàn bộ
    ctx.globalAlpha = 0.1;
    ctx.fillStyle = "white";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;

    ctx.fillStyle = "black";
    ctx.beginPath();

    for (let i = 0; i < particlesArray.length; i++) {
        const p = particlesArray[i];

        // chỉ update khi gần chuột
        if (mouse.x !== null && mouse.y !== null) {
            const dx = mouse.x - p.x;
            const dy = mouse.y - p.y;

            if (dx * dx + dy * dy < mouse.radius * mouse.radius) {
                p.update();
            }
        }

        ctx.rect(p.x, p.y, p.size, p.size);
    }

    ctx.fill();

    requestAnimationFrame(animate);
}

// ===== Resize =====
window.addEventListener("resize", () => {
    resizeCanvas();
    image.onload();
});
</script>
</body>
</html>
